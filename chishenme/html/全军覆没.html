<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f49d25",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221a10",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 justify-between border-b border-primary/10">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined">close</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center font-display">
            犹豫就会败北
        </h2>
<div class="flex w-12 items-center justify-end">
<button class="flex items-center justify-center rounded-lg h-12 bg-transparent text-primary hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">history</span>
</button>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-6 py-12 text-center">
<div class="relative mb-8 group">
<div class="absolute -inset-4 bg-primary/20 rounded-full blur-3xl opacity-50 group-hover:opacity-75 transition-opacity"></div>
<div class="relative flex items-center justify-center w-64 h-64 bg-gradient-to-br from-background-dark to-black rounded-full border-4 border-primary/30 shadow-2xl overflow-hidden" data-alt="Dramatic dark landscape with swirling wind and dust" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDQUGaA9tNuJPafyFQbICr1e1LWNEP3VTlpO9O3SMtOKlCgpDZhjuLeOGIqO1JpP3nv0DMs_yYwjmD4zWG1G60Y9xx-zLwxBqx0X0nLPWmPX6MGeJo46r7LrqgZjlvcraVBGMyyIuVOjs0J_mmGClsYFJFaVCEPKW46kRY4zgXeZGPCzJtO3mD7mn3J9Nm64ngSs_jfp5eVKGxgZ4Uvq3oV46Eu8NQT3Abl-nsbem_rpO7SnyLnn0l-WMzs2N_LegxZ9bEVciRTvPA'); background-size: cover; background-position: center;">
<div class="absolute inset-0 bg-black/40 backdrop-blur-[2px]"></div>
<span class="material-symbols-outlined text-primary text-8xl drop-shadow-[0_0_15px_rgba(244,157,37,0.5)]">
                    air
                </span>
</div>
</div>
<div class="max-w-md space-y-4">
<h1 class="text-4xl font-bold tracking-tighter text-primary font-display">
                全军覆没！
            </h1>
<p class="text-xl font-medium text-slate-400 dark:text-slate-300 leading-relaxed italic">
                “喝西北风吧”
            </p>
<div class="pt-4 pb-8 text-sm text-slate-500 max-w-xs mx-auto">
                你拒绝了所有的提议。机会稍纵即逝，现在只能面对空空如也的行囊。
            </div>
</div>
<div class="w-full max-w-sm space-y-3">
<button class="w-full flex items-center justify-center gap-2 rounded-xl h-14 bg-primary text-background-dark text-lg font-bold tracking-wide hover:scale-[1.02] transition-transform active:scale-95 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined">refresh</span>
<span>大赦天下（重选一次）</span>
</button>
<button class="w-full flex items-center justify-center rounded-xl h-12 bg-primary/10 text-primary text-sm font-semibold hover:bg-primary/20 transition-colors">
                返回主页
            </button>
</div>
</main>
<footer class="mt-auto">
<div class="flex gap-2 border-t border-primary/10 bg-background-light dark:bg-background-dark px-4 pb-6 pt-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 py-2 text-primary" href="#">
<span class="material-symbols-outlined fill-1">home</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 py-2 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">search</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 py-2 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">notifications</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 py-2 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
</a>
</div>
</footer>
</body></html>
