<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f49d25",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221a10",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="flex items-center p-4 justify-between bg-background-light dark:bg-background-dark/50 backdrop-blur-md sticky top-0 z-10">
<div class="flex size-12 items-center justify-start"><button class="text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl">chevron_left</span>
</button></div>
<h1 class="font-display font-bold text-xl tracking-tight text-primary uppercase">犹豫就会饿死</h1>
<div class="flex size-12 items-center justify-end"><button class="text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-2xl">history</span>
</button></div>
</header>
<main class="flex-1 flex flex-col items-center justify-center p-6 gap-8 max-w-md mx-auto w-full">
<div class="text-center space-y-2">
<h2 class="text-2xl font-display font-extrabold leading-tight tracking-tight text-slate-900 dark:text-slate-100">
                看着不错，要不就它了？
            </h2>
<p class="text-slate-500 dark:text-primary/60 font-medium uppercase tracking-widest text-xs">Swipe to Decide Your Meal</p>
</div>
<div class="relative w-full aspect-[4/5] group">
<div class="absolute inset-0 bg-primary/10 rounded-xl rotate-3 scale-95 border-2 border-primary/20"></div>
<div class="absolute inset-0 bg-primary/20 rounded-xl -rotate-2 scale-98 border-2 border-primary/30"></div>
<div class="relative h-full w-full bg-slate-100 dark:bg-background-dark border-4 border-slate-900 dark:border-primary rounded-xl overflow-hidden shadow-2xl flex flex-col">
<div class="flex-1 relative bg-slate-200 dark:bg-zinc-800/50 flex flex-col items-center justify-center p-8 overflow-hidden">
<div class="absolute inset-0 opacity-10 pointer-events-none">
<div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary/40 via-transparent to-transparent"></div>
</div>
<div class="relative z-10 flex flex-col items-center gap-6">
<div class="w-32 h-32 rounded-full bg-primary flex items-center justify-center shadow-[0_0_40px_rgba(244,157,37,0.4)]">
<span class="material-symbols-outlined text-background-dark text-6xl fill-icon">restaurant_menu</span>
</div>
<h3 class="text-5xl font-display font-black tracking-tighter text-slate-900 dark:text-white uppercase">红烧肉</h3>
<div class="flex gap-2">
<span class="px-3 py-1 bg-primary/20 text-primary text-xs font-bold rounded-full uppercase">Classic</span>
<span class="px-3 py-1 bg-primary/20 text-primary text-xs font-bold rounded-full uppercase">Salty-Sweet</span>
</div>
</div>
<div class="absolute bottom-6 left-6 right-6">
<p class="text-slate-600 dark:text-slate-400 text-center font-medium leading-relaxed italic">
                            "经典本帮风味，肥而不腻，入口即化"
                        </p>
</div>
</div>
<div class="p-6 bg-slate-900 dark:bg-primary flex justify-between items-center">
<div class="flex flex-col">
<span class="text-[10px] font-bold uppercase tracking-widest text-slate-400 dark:text-background-dark/60">Estimated Cost</span>
<span class="text-xl font-display font-black text-white dark:text-background-dark">¥ 38.00</span>
</div>
<button class="bg-white dark:bg-background-dark text-slate-900 dark:text-primary px-5 py-2 rounded-lg font-bold text-sm uppercase tracking-tight shadow-lg">
                        View More
                    </button>
</div>
</div>
</div>
<div class="w-full grid grid-cols-3 gap-4 px-2">
<div class="flex flex-col items-center gap-2 group cursor-pointer">
<div class="w-14 h-14 rounded-full border-2 border-slate-300 dark:border-slate-700 flex items-center justify-center group-hover:bg-red-500/10 group-hover:border-red-500 transition-all">
<span class="material-symbols-outlined text-slate-400 group-hover:text-red-500 transition-colors">close</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-slate-400 group-hover:text-red-500 transition-colors">Pass</span>
</div>
<div class="flex flex-col items-center gap-2 group cursor-pointer">
<div class="w-14 h-14 rounded-full border-2 border-slate-300 dark:border-slate-700 flex items-center justify-center group-hover:bg-blue-500/10 group-hover:border-blue-500 transition-all">
<span class="material-symbols-outlined text-slate-400 group-hover:text-blue-500 transition-colors">star</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-slate-400 group-hover:text-blue-500 transition-colors">Save</span>
</div>
<div class="flex flex-col items-center gap-2 group cursor-pointer">
<div class="w-14 h-14 rounded-full border-2 border-slate-300 dark:border-slate-700 flex items-center justify-center group-hover:bg-primary/10 group-hover:border-primary transition-all">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors fill-icon">favorite</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-slate-400 group-hover:text-primary transition-colors">Pick</span>
</div>
</div>
</main>
<footer class="p-6 pb-10 bg-background-light dark:bg-background-dark">
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-display font-black text-lg py-4 rounded-xl shadow-[0_8px_0_rgb(180,110,20)] active:translate-y-1 active:shadow-none transition-all uppercase tracking-tighter">
            随便来一个 (Directly Decide)
        </button>
<nav class="mt-8 flex justify-around items-center border-t border-slate-200 dark:border-slate-800 pt-6">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-icon">explore</span>
<span class="text-[10px] font-bold uppercase tracking-widest">发现</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">bookmark</span>
<span class="text-[10px] font-bold uppercase tracking-widest">收藏</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold uppercase tracking-widest">我的</span>
</a>
</nav>
</footer>
</body></html>
